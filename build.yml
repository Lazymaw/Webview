name: Build Flet APK
on:
  push:
    branches: [ main ] # รันเมื่อมีการ push โค้ดขึ้น branch main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          # คำสั่ง build apk โดยขออนุญาต Internet ไว้เลย
          flet build apk --android-permissions INTERNET
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: webview
          path: build/apk/*.apk
