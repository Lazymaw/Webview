name: Build Flet APK
on:
  push:
    branches: [ main ]
  workflow_dispatch: # เพิ่มปุ่มให้กดสั่ง Build เองได้ด้วย

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          # บังคับสร้าง APK พร้อมเปิดสิทธิ์เน็ต
          flet build apk --android-permissions INTERNET
          
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: my-android-app
          path: build/apk/*.apk
