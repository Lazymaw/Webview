name: Build Flet APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # อัปเดตเป็น v4

      - name: Set up Python
        uses: actions/setup-python@v5 # อัปเดตเป็น v5
        with:
          python-version: '3.10'

      - name: Install Flet
        run: |
          pip install flet

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build APK
        run: |
          # คำสั่ง build apk
          flet build apk --android-permissions INTERNET
          
      - name: Upload APK
        uses: actions/upload-artifact@v4 # <<< แก้จุดนี้เป็น v4 ตามที่ GitHub แจ้งเตือน
        with:
          name: my-android-app
          path: build/apk/*.apk
          if-no-files-found: error # เพิ่มเพื่อให้แจ้งเตือนถ้าหาไฟล์ไม่เจอ
